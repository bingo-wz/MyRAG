services:
  backend:
    build:
      context: ./backend
      args:
        UBUNTU_MIRROR: ${UBUNTU_MIRROR:-http://ports.ubuntu.com/ubuntu-ports}
        MAVEN_MIRROR: ${MAVEN_MIRROR:-https://repo.maven.apache.org/maven2}
    container_name: myrag-backend
    restart: unless-stopped
    volumes:
      - myrag-data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
    container_name: myrag-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:80"

volumes:
  myrag-data:
