name: myrag

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-app-environment: &app-environment
  SPRING_PROFILES_ACTIVE: production
  DATABASE_URL: jdbc:postgresql://postgres:5432/myrag
  DATABASE_USERNAME: ${DATABASE_USERNAME}
  DATABASE_PASSWORD: ${DATABASE_PASSWORD}
  DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-8}
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
  MINIO_BUCKET: ${MINIO_BUCKET:-myrag-knowledge}
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_IMPORT_TOPIC: ${KAFKA_IMPORT_TOPIC:-myrag.import.requested.v1}
  KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-myrag-import-workers}
  KAFKA_CONCURRENCY: ${KAFKA_CONCURRENCY:-1}
  KAFKA_IMPORT_PARTITIONS: ${KAFKA_IMPORT_PARTITIONS:-3}
  KAFKA_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-1}
  OUTBOX_RETENTION_DAYS: ${OUTBOX_RETENTION_DAYS:-7}
  MILVUS_URI: http://milvus:19530
  MILVUS_TOKEN: ${MILVUS_TOKEN:-root:Milvus}
  MILVUS_COLLECTION: ${MILVUS_COLLECTION:-myrag_chunks_v1}
  SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:?请配置 SiliconFlow API Key}
  EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}
  EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-${SILICONFLOW_API_KEY}}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
  EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
  EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
  CHAT_BASE_URL: ${CHAT_BASE_URL:-${EMBEDDING_BASE_URL:-https://api.siliconflow.cn/v1}}
  CHAT_API_KEY: ${CHAT_API_KEY:-${SILICONFLOW_API_KEY}}
  CHAT_MODEL: ${CHAT_MODEL:-Qwen/Qwen3-8B}
  CHAT_MAX_TOKENS: ${CHAT_MAX_TOKENS:-800}
  CHAT_MAX_ATTEMPTS: ${CHAT_MAX_ATTEMPTS:-2}
  CHAT_ENABLE_THINKING: ${CHAT_ENABLE_THINKING:-false}
  AI_HTTP_CONNECT_TIMEOUT_SECONDS: ${AI_HTTP_CONNECT_TIMEOUT_SECONDS:-3}
  AI_HTTP_READ_TIMEOUT_SECONDS: ${AI_HTTP_READ_TIMEOUT_SECONDS:-60}
  PARSE_TIMEOUT_SECONDS: ${PARSE_TIMEOUT_SECONDS:-120}
  MAX_FILE_SIZE: ${MAX_FILE_SIZE:-20MB}
  MAX_REQUEST_SIZE: ${MAX_REQUEST_SIZE:-100MB}
  RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-6}
  RETRIEVAL_MIN_SCORE: ${RETRIEVAL_MIN_SCORE:-0.18}
  CHUNK_TARGET_TOKENS: ${CHUNK_TARGET_TOKENS:-480}
  CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-60}
  VECTOR_RECONCILIATION_ENABLED: ${VECTOR_RECONCILIATION_ENABLED:-true}
  VECTOR_RECONCILIATION_CRON: ${VECTOR_RECONCILIATION_CRON:-0 30 3 * * *}

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: myrag
      POSTGRES_USER: ${DATABASE_USERNAME:?请在 .env 中配置 DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?请在 .env 中配置 DATABASE_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=60
      - -c
      - wal_compression=on
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d myrag"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    logging: *default-logging

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?请在 .env 中配置 MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?请在 .env 中配置 MINIO_SECRET_KEY}
      MINIO_COMPRESSION_ENABLE: "on"
      MINIO_COMPRESSION_EXTENSIONS: ".txt,.md,.csv,.tsv,.json,.xml,.html,.rtf"
      MINIO_COMPRESSION_MIME_TYPES: "text/*,application/json,application/xml"
    volumes:
      - minio-data:/data
    ports:
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 384m
    logging: *default-logging

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
      - --auto-compaction-mode=revision
      - --auto-compaction-retention=1000
      - --quota-backend-bytes=1073741824
    restart: unless-stopped
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    logging: *default-logging

  milvus:
    image: milvusdb/milvus:v2.6.18
    command: ["milvus", "run", "standalone"]
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      COMMON_STORAGETYPE: remote
      COMMON_SECURITY_AUTHORIZATIONENABLED: "true"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "127.0.0.1:19530:19530"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      start_period: 60s
      timeout: 10s
      retries: 10
    mem_limit: 2560m
    logging: *default-logging

  kafka:
    image: apache/kafka:4.1.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_LOG_SEGMENT_BYTES: 67108864
      KAFKA_LOG_CLEANUP_POLICY: delete
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      start_period: 30s
      timeout: 10s
      retries: 10
    mem_limit: 768m
    logging: *default-logging

  backend:
    image: myrag-backend:local
    build:
      context: ./backend
      args:
        UBUNTU_MIRROR: ${UBUNTU_MIRROR:-http://ports.ubuntu.com/ubuntu-ports}
        MAVEN_MIRROR: ${MAVEN_MIRROR:-https://repo.maven.apache.org/maven2}
    restart: unless-stopped
    environment:
      <<: *app-environment
      API_ENABLED: "true"
      APP_IMPORT_WORKER_ENABLED: "false"
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx384m
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 15s
      start_period: 45s
      timeout: 5s
      retries: 10
    mem_limit: 640m
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  worker:
    image: myrag-backend:local
    restart: unless-stopped
    environment:
      <<: *app-environment
      API_ENABLED: "false"
      APP_IMPORT_WORKER_ENABLED: "true"
      SPRING_MAIN_WEB_APPLICATION_TYPE: none
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx448m
    depends_on:
      backend:
        condition: service_healthy
    mem_limit: 704m
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777,nosuid,nodev
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:80"
    mem_limit: 96m
    logging: *default-logging

volumes:
  postgres-data:
  minio-data:
  etcd-data:
  milvus-data:
  kafka-data:
