x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: myrag
      POSTGRES_USER: ${DATABASE_USERNAME:?请在 .env 中配置 DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?请在 .env 中配置 DATABASE_PASSWORD}
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - max_connections=60
      - -c
      - wal_compression=on
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d myrag"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 512m
    logging: *default-logging

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?请在 .env 中配置 MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?请在 .env 中配置 MINIO_SECRET_KEY}
      MINIO_COMPRESSION_ENABLE: "on"
      MINIO_COMPRESSION_EXTENSIONS: ".txt,.md,.csv,.tsv,.json,.xml,.html,.rtf"
      MINIO_COMPRESSION_MIME_TYPES: "text/*,application/json,application/xml"
    volumes:
      - minio-data:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 384m
    logging: *default-logging

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command:
      - etcd
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
      - --auto-compaction-mode=revision
      - --auto-compaction-retention=1000
      - --quota-backend-bytes=1073741824
    restart: unless-stopped
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    logging: *default-logging

  milvus:
    image: milvusdb/milvus:v2.6.18
    command: ["milvus", "run", "standalone"]
    restart: unless-stopped
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      COMMON_STORAGETYPE: remote
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "19530:19530"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      start_period: 60s
      timeout: 10s
      retries: 10
    mem_limit: 2560m
    logging: *default-logging

  kafka:
    image: apache/kafka:4.1.0
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_LOG_SEGMENT_BYTES: 67108864
      KAFKA_LOG_CLEANUP_POLICY: delete
      KAFKA_HEAP_OPTS: -Xms256m -Xmx512m
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      start_period: 30s
      timeout: 10s
      retries: 10
    mem_limit: 768m
    logging: *default-logging

  backend:
    build:
      context: ./backend
      args:
        UBUNTU_MIRROR: ${UBUNTU_MIRROR:-http://ports.ubuntu.com/ubuntu-ports}
        MAVEN_MIRROR: ${MAVEN_MIRROR:-https://repo.maven.apache.org/maven2}
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: production
      DATABASE_URL: jdbc:postgresql://postgres:5432/myrag
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-myrag-knowledge}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MILVUS_URI: http://milvus:19530
      MILVUS_TOKEN: ${MILVUS_TOKEN:-root:Milvus}
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-myrag_chunks_v1}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:?请配置 OpenAI-compatible Embedding 地址}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1024}
      JAVA_TOOL_OPTIONS: -Xms128m -Xmx512m
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      milvus:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      start_period: 45s
      timeout: 5s
      retries: 10
    mem_limit: 768m
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    mem_limit: 96m
    logging: *default-logging

volumes:
  postgres-data:
  minio-data:
  etcd-data:
  milvus-data:
  kafka-data:
