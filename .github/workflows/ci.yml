name: 持续集成

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: 后端测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Maven 验证
        run: mvn --batch-mode --no-transfer-progress verify

  frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: "10"
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: 安装依赖
        run: pnpm install --frozen-lockfile
      - name: TypeScript 与生产构建
        run: pnpm build

  compose:
    name: 生产编排校验
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 校验 Docker Compose
        run: docker compose --env-file .env.example -f docker-compose.production.yml config --quiet
