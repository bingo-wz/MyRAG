spring:
  application:
    name: ai-knowledge-base
  datasource:
    url: jdbc:h2:mem:knowledge_base;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

app:
  ai-http:
    connect-timeout-seconds: 3
    read-timeout-seconds: 60
  demo-data: true
  runtime:
    api-enabled: true
  security:
    enabled: false
    audit-enabled: false
    file-scan:
      provider: noop
  import:
    storage-path: ./data/imports
    max-files-per-batch: 50
    max-file-size-bytes: 20971520
    max-batch-size-bytes: 104857600
    max-extracted-characters: 2000000
    parse-timeout-seconds: 120
    ocr-language: chi_sim+eng
    worker-enabled: true
    poll-interval-ms: 500
    recovery-delay-ms: 500
    lease-seconds: 300
    max-attempts: 5
  storage:
    provider: filesystem
    root: ./data/imports
  kafka:
    enabled: false
    import-topic: myrag.import.requested.v1
  embedding:
    provider: hash
    dimensions: 256
  chat:
    provider: extractive
  vector:
    store: inline
    reconciliation:
      enabled: false
  retrieval:
    top-k: 4
    min-score: 0.08
    target-tokens: 480
    overlap-tokens: 60
