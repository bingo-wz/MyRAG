spring:
  application:
    name: ai-knowledge-base
  datasource:
    url: jdbc:h2:mem:knowledge_base;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  demo-data: true
  import:
    storage-path: ./data/imports
    max-files-per-batch: 50
    max-extracted-characters: 2000000
    ocr-language: chi_sim+eng
  retrieval:
    top-k: 4
    min-score: 0.08
    chunk-size: 420
